<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon - Hidden Cut Lines</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a2e; 
            font-family: sans-serif;
        }
        canvas { 
            display: block; 
        }
        
        #control-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        
        input[type=checkbox] {
            cursor: pointer;
            transform: scale(1.2);
        }

        #instructions {
            text-align: center;
            font-size: 0.85em;
            color: rgba(255,255,255,0.6);
            margin-bottom: 5px;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="control-panel">
        <div id="instructions">Click & Drag background to rotate view</div>
        
        <div class="control-group">
            <label for="splitSlider">1. Main Area Split</label>
            <input type="range" id="splitSlider" min="0" max="4" step="0.05" value="0">
        </div>

        <div class="control-group">
            <label for="subSplitSlider">2. Right-Angle Split (Outer Triangles)</label>
            <input type="range" id="subSplitSlider" min="0" max="2" step="0.05" value="0">
        </div>

        <div class="toggle-group">
            <label for="rotateToggle">Cinematic Auto-Rotate</label>
            <input type="checkbox" id="rotateToggle" checked>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(15, 15, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 2. CALCULATE THE 6 VERTICES
        const s = 4; 
        const vertices = [];
        for(let i = 0; i < 6; i++) {
            const angle = i * (Math.PI / 3);
            vertices.push(new THREE.Vector2(s * Math.cos(angle), s * Math.sin(angle)));
        }

        const v0 = vertices[0], v1 = vertices[1], v2 = vertices[2];
        const v3 = vertices[3], v4 = vertices[4], v5 = vertices[5];

        const m1 = new THREE.Vector2((v0.x + v2.x)/2, (v0.y + v2.y)/2); 
        const m2 = new THREE.Vector2((v0.x + v4.x)/2, (v0.y + v4.y)/2); 

        const cT1 = new THREE.Vector2((v0.x + v1.x + v2.x)/3, (v0.y + v1.y + v2.y)/3);
        const cT2 = new THREE.Vector2((v0.x + v2.x + v3.x)/3, (v0.y + v2.y + v3.y)/3);
        const cT3 = new THREE.Vector2((v0.x + v3.x + v4.x)/3, (v0.y + v3.y + v4.y)/3);
        const cT4 = new THREE.Vector2((v0.x + v4.x + v5.x)/3, (v0.y + v4.y + v5.y)/3);

        const triangleData = [
            { pts: [v0, m1, v1], parentCenter: cT1, hasSubSplit: true,  sharedColor: 0xff595e, indivColor: 0xff595e }, 
            { pts: [v2, m1, v1], parentCenter: cT1, hasSubSplit: true,  sharedColor: 0xff595e, indivColor: 0xff924c }, 
            { pts: [v0, v2, v3], parentCenter: cT2, hasSubSplit: false, sharedColor: null,     indivColor: 0xffca3a }, 
            { pts: [v0, v3, v4], parentCenter: cT3, hasSubSplit: false, sharedColor: null,     indivColor: 0x8ac926 }, 
            { pts: [v0, m2, v5], parentCenter: cT4, hasSubSplit: true,  sharedColor: 0x1982c4, indivColor: 0x1982c4 }, 
            { pts: [v4, m2, v5], parentCenter: cT4, hasSubSplit: true,  sharedColor: 0x1982c4, indivColor: 0x6a4c93 }  
        ];

        const extrudeSettings = { depth: 8, bevelEnabled: false };
        const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
        const hexGroup = new THREE.Group();

        // 3. CREATE DYNAMIC WIREFRAMES

        // A. Full Hexagon Wireframe (Visible when completely closed)
        const hexShape = new THREE.Shape();
        hexShape.moveTo(v0.x, v0.y);
        [v1, v2, v3, v4, v5].forEach(v => hexShape.lineTo(v.x, v.y));
        hexShape.lineTo(v0.x, v0.y);
        const hexGeo = new THREE.ExtrudeGeometry(hexShape, extrudeSettings);
        hexGeo.translate(0, 0, -4);
        const fullHexEdges = new THREE.LineSegments(new THREE.EdgesGeometry(hexGeo), edgeMat);
        hexGroup.add(fullHexEdges);

        // B. Top Parent Triangle Wireframe (Visible during main split)
        const topParShape = new THREE.Shape();
        topParShape.moveTo(v0.x, v0.y); topParShape.lineTo(v2.x, v2.y); topParShape.lineTo(v1.x, v1.y); topParShape.lineTo(v0.x, v0.y);
        const topParGeo = new THREE.ExtrudeGeometry(topParShape, extrudeSettings);
        topParGeo.translate(0, 0, -4);
        const topParEdges = new THREE.LineSegments(new THREE.EdgesGeometry(topParGeo), edgeMat);
        const parentDistT1 = Math.sqrt(cT1.x**2 + cT1.y**2);
        topParEdges.userData = { dirX: cT1.x / parentDistT1, dirY: cT1.y / parentDistT1 };
        hexGroup.add(topParEdges);

        // C. Bottom Parent Triangle Wireframe (Visible during main split)
        const botParShape = new THREE.Shape();
        botParShape.moveTo(v0.x, v0.y); botParShape.lineTo(v4.x, v4.y); botParShape.lineTo(v5.x, v5.y); botParShape.lineTo(v0.x, v0.y);
        const botParGeo = new THREE.ExtrudeGeometry(botParShape, extrudeSettings);
        botParGeo.translate(0, 0, -4);
        const botParEdges = new THREE.LineSegments(new THREE.EdgesGeometry(botParGeo), edgeMat);
        const parentDistT4 = Math.sqrt(cT4.x**2 + cT4.y**2);
        botParEdges.userData = { dirX: cT4.x / parentDistT4, dirY: cT4.y / parentDistT4 };
        hexGroup.add(botParEdges);

        // 4. ASSEMBLE THE 6 SOLID TRIANGLES
        const prisms = [];

        triangleData.forEach((data) => {
            const shape = new THREE.Shape();
            shape.moveTo(data.pts[0].x, data.pts[0].y);
            shape.lineTo(data.pts[1].x, data.pts[1].y);
            shape.lineTo(data.pts[2].x, data.pts[2].y);
            shape.lineTo(data.pts[0].x, data.pts[0].y); 

            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geometry.translate(0, 0, -4); 

            const material = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.2 });
            const mesh = new THREE.Mesh(geometry, material);
            
            // Generate the outline for this specific sub-piece
            const line = new THREE.LineSegments(new THREE.EdgesGeometry(geometry), edgeMat);
            mesh.add(line);

            const parentDist = Math.sqrt(data.parentCenter.x**2 + data.parentCenter.y**2);
            const cx = (data.pts[0].x + data.pts[1].x + data.pts[2].x) / 3;
            const cy = (data.pts[0].y + data.pts[1].y + data.pts[2].y) / 3;
            const subVectorX = cx - data.parentCenter.x;
            const subVectorY = cy - data.parentCenter.y;
            const subVectorLength = Math.sqrt(subVectorX**2 + subVectorY**2);

            mesh.userData = { 
                mainDirX: data.parentCenter.x / parentDist, 
                mainDirY: data.parentCenter.y / parentDist,
                hasSubSplit: data.hasSubSplit,
                subDirX: data.hasSubSplit ? (subVectorX / subVectorLength) : 0,
                subDirY: data.hasSubSplit ? (subVectorY / subVectorLength) : 0,
                sharedColor: data.sharedColor,
                indivColor: data.indivColor,
                line: line // Store reference to toggle this outline later
            };

            prisms.push(mesh);
            hexGroup.add(mesh);
        });

        hexGroup.rotation.x = -Math.PI / 2;
        scene.add(hexGroup);

        // 5. GET UI ELEMENTS
        const splitSlider = document.getElementById('splitSlider');
        const subSplitSlider = document.getElementById('subSplitSlider');
        const rotateToggle = document.getElementById('rotateToggle');

        // 6. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            
            const mainDist = parseFloat(splitSlider.value); 
            const subDist = parseFloat(subSplitSlider.value); 

            // Wireframe Visibility States
            const isCompletelyJoined = (mainDist === 0 && subDist === 0);
            const isOnlyMainSplit = (mainDist > 0 && subDist === 0);

            // Toggle the fake parent wireframes
            fullHexEdges.visible = isCompletelyJoined;
            topParEdges.visible = isOnlyMainSplit;
            botParEdges.visible = isOnlyMainSplit;

            // Move the parent wireframes alongside the hidden pieces
            if (isOnlyMainSplit) {
                topParEdges.position.set(topParEdges.userData.dirX * mainDist, topParEdges.userData.dirY * mainDist, 0);
                botParEdges.position.set(botParEdges.userData.dirX * mainDist, botParEdges.userData.dirY * mainDist, 0);
            }

            prisms.forEach((prism) => {
                // Positional Logic
                let finalX = prism.userData.mainDirX * mainDist;
                let finalY = prism.userData.mainDirY * mainDist;

                if (prism.userData.hasSubSplit) {
                    finalX += prism.userData.subDirX * subDist;
                    finalY += prism.userData.subDirY * subDist;
                }
                prism.position.set(finalX, finalY, 0);

                // Color Logic
                let targetHex = 0xcccccc; 
                if (prism.userData.hasSubSplit) {
                    if (subDist > 0) targetHex = prism.userData.indivColor; 
                    else if (mainDist > 0) targetHex = prism.userData.sharedColor; 
                } else {
                    if (mainDist > 0 || subDist > 0) targetHex = prism.userData.indivColor; 
                }
                prism.material.color.setHex(targetHex);

                // Individual Wireframe Logic
                if (prism.userData.hasSubSplit) {
                    // Right triangles only show their cuts if the 2nd slider is moved
                    prism.userData.line.visible = (subDist > 0);
                } else {
                    // Inner triangles show their cuts as soon as the hexagon is opened
                    prism.userData.line.visible = !isCompletelyJoined;
                }
            });

            if (rotateToggle.checked) {
                hexGroup.rotation.z += 0.005;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
